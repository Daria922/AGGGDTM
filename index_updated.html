<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Опросник</title>

    <link rel="stylesheet" href="./index_updated.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Creepster&family=Libre+Baskerville:wght@400;700&family=Special+Elite&display=swap" rel="stylesheet">
</head>

<body>

    <main class="survey">

        <h1>ОПРОСНИК</h1>

        <p class="intro">
            Ответь на несколько вопросов
        </p>


        <form id="surveyForm">


            <!-- ВОПРОС 1 -->

            <div class="question">

                <h2>1) Любимый персонаж</h2>

                <label>
                    <input type="radio" name="character" value="Рави">
                    Рави
                </label>

                <label>
                    <input type="radio" name="character" value="Коннор">
                    Коннор
                </label>

                <label>
                    <input type="radio" name="character" value="Пипа">
                    Пипа
                </label>

                <label>
                    <input type="radio" name="character" value="Другое">
                    Другой
                </label>

                <div class="other-panel">
                    <input type="text" placeholder="Напиши свой вариант...">
                </div>

            </div>


            <!-- ВОПРОС 2 -->

            <div class="question">

                <h2>2) Самая интересная сюжетная линия</h2>

                <label>
                    <input type="radio" name="plot" value="Раскрытие тайны">
                    Раскрытие убийцы
                </label>

                <label>
                    <input type="radio" name="plot" value="Неожиданная встреча">
                    Суд над Максом
                </label>

                <label>
                    <input type="radio" name="plot" value="Финальный поворот">
                    Ребенок Браунсвика
                </label>

                <label>
                    <input type="radio" name="plot" value="Другое">
                    Другое
                </label>

                <div class="other-panel">
                    <input type="text" placeholder="Напиши свой вариант...">
                </div>

            </div>


            <!-- ВОПРОС 3 -->

            <div class="question">

                <h2>3) Рави или Коннор?</h2>

                <label>
                    <input type="radio" name="raviConnor" value="Рави">
                    Рави
                </label>

                <label>
                    <input type="radio" name="raviConnor" value="Коннор">
                    Коннор
                </label>

                <label>
                    <input type="radio" name="raviConnor" value="Оба">
                    Пипа
                </label>

                <label>
                    <input type="radio" name="raviConnor" value="Другое">
                    Другое
                </label>

                <div class="other-panel">
                    <input type="text" placeholder="Напиши свой вариант...">
                </div>

            </div>


            <!-- ВОПРОС 4 -->

            <div class="question">

                <h2>4) Пипа хорошая?</h2>

                <label>
                    <input type="radio" name="pipa" value="Да">
                    Да
                </label>

                <label>
                    <input type="radio" name="pipa" value="Нет">
                    Нет
                </label>

                <label>
                    <input type="radio" name="pipa" value="Сложно сказать">
                    Сложно сказать
                </label>

                <label>
                    <input type="radio" name="pipa" value="Другое">
                    Другое
                </label>

                <div class="other-panel">
                    <input type="text" placeholder="Напиши свой вариант...">
                </div>

            </div>


            <!-- ВОПРОС 5 -->

            <div class="question">

                <h2>5) Понравилась книга?</h2>

                <label>
                    <input type="radio" name="book" value="Очень понравилась">
                    Очень понравилась
                </label>

                <label>
                    <input type="radio" name="book" value="Понравилась">
                    Понравилась
                </label>

                <label>
                    <input type="radio" name="book" value="Не очень">
                    Не оч
                </label>

                <label>
                    <input type="radio" name="book" value="Не понравилась">
                    Не мое
                </label>

                <label>
                    <input type="radio" name="book" value="Другое">
                    Другое
                </label>

                <div class="other-panel">
                    <input type="text" placeholder="Напиши свой вариант...">
                </div>

            </div>


            <!-- ВОПРОС 6 -->

            <div class="question">

                <h2>6) Какая часть лучше?</h2>

                <label>
                    <input type="radio" name="part" value="Первая">
                    Первая
                </label>

                <label>
                    <input type="radio" name="part" value="Вторая">
                    Вторая
                </label>

                <label>
                    <input type="radio" name="part" value="Обе">
                    Обе
                </label>

                 <label>
                    <input type="radio" name="part" value="Третья">
                    Третью не читала, но уже знаю что она
                </label>

                <label>
                    <input type="radio" name="part" value="Другое">
                    Другое
                </label>

                <div class="other-panel">
                    <input type="text" placeholder="Напиши свой вариант...">
                </div>

            </div>


            <!-- ВОПРОС 7 -->

            <div class="final-question">

                <h2>
                    7) Кто будет искать тебя,<br>
                    когда ты исчезнешь?
                </h2>

                <label class="final-answer">

                    <input
                        type="radio"
                        name="finalAnswer"
                        value="НИКТО"
                        checked
                        disabled
                    >

                    <span>НИКТО</span>

                </label>

            </div>


            <button type="submit"  id="submitButton" disabled>
                ОТПРАВИТЬ 
            </button>


        </form>


        <div id="result"></div>


    </main>

    
<script>
const form = document.getElementById("surveyForm");
const result = document.getElementById("result");

document.querySelectorAll(".question").forEach(question => {
    const radios = question.querySelectorAll('input[type="radio"]');
    const otherPanel = question.querySelector(".other-panel");

    if (!otherPanel) return;

    radios.forEach(radio => {
        radio.addEventListener("change", function () {
            if (this.value === "Другое") {
                otherPanel.classList.add("active");

                const input = otherPanel.querySelector("input");
                input.disabled = false;
                input.focus();
            } else {
                otherPanel.classList.remove("active");

                const input = otherPanel.querySelector("input");
                input.value = "";
                input.disabled = true;
            }
        });
    });

    // Поле скрыто и отключено до выбора "Другое"
    const input = otherPanel.querySelector("input");
    input.disabled = true;
});

form.addEventListener("submit", function(event) {
    event.preventDefault();

    result.textContent =
        "Ответы записаны. Последний уже известен";
});

const submitButton = document.getElementById("submitButton");

const questions = document.querySelectorAll(".question");

function checkAnswers() {

    let allAnswered = true;

    questions.forEach(question => {

        const selectedAnswer = question.querySelector(
            'input[type="radio"]:checked'
        );

        if (!selectedAnswer) {
            allAnswered = false;
        }

    });

    submitButton.disabled = !allAnswered;

}


// Проверяем ответы после каждого выбора
document.querySelectorAll(
    '.question input[type="radio"]'
).forEach(radio => {

    radio.addEventListener("change", checkAnswers);

});


checkAnswers();
</script>


</body>
</html>
